<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growatt Inverter Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: #10b981;
        }
        
        .status-indicator.offline {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h2 {
            color: #4c1d95;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .metric:last-child {
            border-bottom: none;
        }
        
        .metric.sub-metric {
            padding-left: 30px;
            font-size: 13px;
            opacity: 0.9;
        }
        
        .metric-label {
            color: #6b7280;
            font-size: 14px;
        }
        
        .metric-value {
            color: #111827;
            font-weight: 600;
            font-size: 16px;
        }
        
        .metric-value.positive {
            color: #10b981;
        }
        
        .metric-value.negative {
            color: #ef4444;
        }
        
        .metric-value.warning {
            color: #f59e0b;
        }
        
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .mode-badge.battery-first,
        .mode-badge.mode-battery {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .mode-badge.load-first {
            background: #fef3c7;
            color: #92400e;
        }
        
        .mode-badge.grid-first,
        .mode-badge.mode-grid {
            background: #dcfce7;
            color: #166534;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #34d399);
            transition: width 0.5s ease;
        }
        
        .last-update {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 20px;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
        
        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }
        
        .schedule-time {
            color: #4b5563;
        }
        
        .schedule-mode {
            font-weight: 500;
        }
        
        #refreshButton:hover:not(:disabled) {
            background: #45a049 !important;
        }
        
        #refreshButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Manual Control Styles */
        .manual-control-card {
            border: 2px solid #3b82f6;
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
        }
        
        .manual-status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #10b981;
            color: white;
            margin-left: 10px;
            font-weight: 500;
        }
        
        .manual-status-badge.manual {
            background: #f59e0b;
            animation: pulse 2s infinite;
        }
        
        .mode-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        
        .mode-btn {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .mode-btn:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .mode-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        
        .duration-selector {
            margin-top: 20px;
        }
        
        .duration-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 10px 0;
        }
        
        .duration-btn {
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        
        .duration-btn:hover {
            background: #f3f4f6;
        }
        
        .duration-btn.active {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1e40af;
        }
        
        .duration-input {
            margin-top: 10px;
        }
        
        .duration-input input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .advanced-params {
            margin-top: 20px;
        }
        
        .advanced-params summary {
            cursor: pointer;
            padding: 10px;
            background: #f9fafb;
            border-radius: 6px;
            font-weight: 500;
        }
        
        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .param-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #6b7280;
        }
        
        .param-item input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .manual-status-section {
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        
        .current-mode-value {
            font-weight: 600;
            color: #1f2937;
        }
        
        .countdown-timer {
            color: #f59e0b;
            font-weight: bold;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v10l3-3M9 7l3 3M3 11h3M18 11h3M5.6 17.4l2.1-2.1M16.3 17.4l-2.1-2.1"/>
                </svg>
                Growatt Inverter Dashboard
                <span class="status-indicator" id="connectionStatus"></span>
                <button id="refreshButton" onclick="refreshAllData()" style="margin-left: 20px; padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                        <path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                    Refresh
                </button>
            </h1>
        </header>
        
        <div class="error-message" id="errorMessage"></div>
        
        <div class="dashboard" id="dashboard">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading inverter data...</p>
            </div>
        </div>
        
        <div class="last-update" id="lastUpdate"></div>
    </div>
    
    <script>
        let updateInterval;
        let apiStatusData = null;
        let slotConfigData = null;  // Cache slot configurations separately
        
        // Fetch telemetry data only (no GET commands to inverter)
        async function fetchTelemetryData() {
            try {
                const dashboardResponse = await fetch('/inverter/status');
                
                if (!dashboardResponse.ok) {
                    throw new Error(`Dashboard HTTP error! status: ${dashboardResponse.status}`);
                }
                
                const data = await dashboardResponse.json();
                
                // Merge cached slot config if available
                if (slotConfigData) {
                    data.battery_first_data = slotConfigData.battery_first_data;
                    data.grid_first_data = slotConfigData.grid_first_data;
                }
                
                updateDashboard(data);
                document.getElementById('errorMessage').style.display = 'none';
            } catch (error) {
                console.error('Error fetching telemetry data:', error);
                showError('Failed to fetch telemetry data. Please check the connection.');
            }
        }
        
        // Fetch everything including slot configurations (with GET commands)
        async function fetchInverterData() {
            try {
                // Fetch both dashboard status and API status
                const [dashboardResponse, apiResponse] = await Promise.all([
                    fetch('/inverter/status'),
                    fetch('/api/growatt/status')
                ]);
                
                if (!dashboardResponse.ok) {
                    throw new Error(`Dashboard HTTP error! status: ${dashboardResponse.status}`);
                }
                
                const data = await dashboardResponse.json();
                
                // Try to get API status data if available
                if (apiResponse.ok) {
                    apiStatusData = await apiResponse.json();
                    // Cache slot configuration data
                    if (apiStatusData.inverter_data) {
                        slotConfigData = {
                            battery_first_data: apiStatusData.inverter_data.battery_first_data,
                            grid_first_data: apiStatusData.inverter_data.grid_first_data
                        };
                    }
                }
                
                updateDashboard(data);
                document.getElementById('errorMessage').style.display = 'none';
            } catch (error) {
                console.error('Error fetching inverter data:', error);
                showError('Failed to fetch inverter data. Please check the connection.');
            }
        }
        
        function updateDashboard(data) {
            const dashboard = document.getElementById('dashboard');
            
            // Update connection status
            const statusIndicator = document.getElementById('connectionStatus');
            statusIndicator.className = `status-indicator ${data.connected ? 'online' : 'offline'}`;
            
            // Build dashboard HTML
            dashboard.innerHTML = `
                <!-- System Status Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        System Status
                    </h2>
                    <div class="metric">
                        <span class="metric-label">Mode</span>
                        <span class="metric-value">
                            <span class="mode-badge ${getModeClass(data.current_mode)}">${data.current_mode || 'Unknown'}</span>
                        </span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Simulation Mode</span>
                        <span class="metric-value">${data.simulation_mode ? 'Yes' : 'No'}</span>
                    </div>
                </div>
                
                <!-- Power Flow Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        Power Flow
                    </h2>
                    <div class="metric">
                        <span class="metric-label">Solar Production</span>
                        <span class="metric-value positive">${formatPower(data.solar_power)} W</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Battery Power</span>
                        <span class="metric-value ${data.battery_power > 0 ? 'positive' : 'negative'}">${formatPower(data.battery_power)} W</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Grid Power</span>
                        <span class="metric-value ${data.grid_power < 0 ? 'positive' : 'negative'}">${formatPower(data.grid_power)} W</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Load Power</span>
                        <span class="metric-value">${formatPower(data.load_power)} W</span>
                    </div>
                </div>
                
                <!-- Battery Status Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="6" width="18" height="12" rx="2"/>
                            <path d="M23 10v4"/>
                        </svg>
                        Battery Status
                    </h2>
                    <div class="metric">
                        <span class="metric-label">State of Charge</span>
                        <span class="metric-value">${data.battery_soc || 0}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${data.battery_soc || 0}%"></div>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Voltage</span>
                        <span class="metric-value">${formatVoltage(data.battery_voltage)} V</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Current</span>
                        <span class="metric-value">${formatCurrent(data.battery_current)} A</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Temperature</span>
                        <span class="metric-value ${data.battery_temp > 40 ? 'warning' : ''}">${data.battery_temp || '--'}°C</span>
                    </div>
                </div>
                
                <!-- Energy Prices Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                        </svg>
                        Configuration
                    </h2>
                    <div class="metric">
                        <span class="metric-label">Export Price Threshold</span>
                        <span class="metric-value">${data.export_threshold} EUR/MWh</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Season Mode</span>
                        <span class="metric-value">${data.season_mode || 'Unknown'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">AC Enabled</span>
                        <span class="metric-value">${data.ac_enabled ? 'Yes' : 'No'}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Export Enabled</span>
                        <span class="metric-value">${data.export_enabled ? 'Yes' : 'No'}</span>
                    </div>
                </div>
                
                <!-- Manual Mode Control Card -->
                <div class="card manual-control-card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M2 12h20"/>
                            <circle cx="12" cy="12" r="3" fill="currentColor"/>
                        </svg>
                        Manual Mode Control
                        <span class="manual-status-badge" id="manualStatusBadge">AUTO</span>
                    </h2>
                    
                    <!-- Current Status Section -->
                    <div class="manual-status-section">
                        <div class="status-row">
                            <span>Current Mode:</span>
                            <span class="current-mode-value" id="currentModeValue">Automatic (Price-Based)</span>
                        </div>
                        <div class="status-row" id="manualEndTime" style="display:none;">
                            <span>Manual Override Until:</span>
                            <span class="end-time-value" id="endTimeValue">--</span>
                            <span class="countdown-timer" id="countdownTimer"></span>
                        </div>
                    </div>
                    
                    <!-- Mode Selection -->
                    <div class="mode-selector">
                        <label style="font-weight: 500; margin-bottom: 10px; display: block;">Select Mode:</label>
                        <div class="mode-buttons">
                            <button class="mode-btn" data-mode="battery_first" onclick="selectMode('battery_first')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
                                    <line x1="23" y1="13" x2="23" y2="11"/>
                                </svg>
                                Battery First
                            </button>
                            <button class="mode-btn" data-mode="grid_first" onclick="selectMode('grid_first')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2v10l3-3M9 7l3 3"/>
                                </svg>
                                Grid First
                            </button>
                            <button class="mode-btn active" data-mode="auto" onclick="selectMode('auto')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/>
                                </svg>
                                Automatic
                            </button>
                        </div>
                    </div>
                    
                    <!-- Duration Selection (shows when mode selected) -->
                    <div class="duration-selector" id="durationSelector" style="display:none;">
                        <label style="font-weight: 500; margin-bottom: 10px; display: block;">Duration:</label>
                        <div class="duration-options">
                            <button class="duration-btn active" data-duration="immediate" onclick="selectDuration('immediate')">
                                Until Manually Cleared
                            </button>
                            <button class="duration-btn" data-duration="eod" onclick="selectDuration('eod')">
                                Until End of Day
                            </button>
                            <button class="duration-btn" data-duration="hours" onclick="selectDuration('hours')">
                                For X Hours
                            </button>
                            <button class="duration-btn" data-duration="until" onclick="selectDuration('until')">
                                Until Specific Time
                            </button>
                        </div>
                        
                        <!-- Dynamic input based on duration type -->
                        <div class="duration-input" id="durationInputHours" style="display:none;">
                            <input type="number" id="hoursInput" min="1" max="24" value="2" placeholder="Hours">
                        </div>
                        <div class="duration-input" id="durationInputTime" style="display:none;">
                            <input type="time" id="timeInput" value="18:00">
                        </div>
                    </div>
                    
                    <!-- Advanced Parameters (collapsible) -->
                    <details class="advanced-params" id="advancedParams">
                        <summary>Advanced Settings</summary>
                        <div class="param-grid">
                            <div class="param-item">
                                <label>Stop SOC (%):</label>
                                <input type="number" id="stopSoc" min="10" max="100" value="90">
                            </div>
                            <div class="param-item">
                                <label>Power Rate (%):</label>
                                <input type="number" id="powerRate" min="10" max="100" value="100">
                            </div>
                        </div>
                    </details>
                    
                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <button class="btn btn-primary" id="applyManualMode" onclick="applyManualMode()">
                            Apply Manual Mode
                        </button>
                        <button class="btn btn-secondary" id="resetToAuto" onclick="resetToAutomatic()">
                            Reset to Automatic
                        </button>
                    </div>
                </div>
                
                <!-- Battery First Mode Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
                            <line x1="23" y1="13" x2="23" y2="11"/>
                            <rect x="4" y="9" width="6" height="6" fill="currentColor"/>
                        </svg>
                        Battery First Mode
                    </h2>
                    ${renderBatteryFirstStatus()}
                </div>
                
                <!-- Grid First Mode Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v10l3-3M9 7l3 3M3 11h3M18 11h3M5.6 17.4l2.1-2.1M16.3 17.4l-2.1-2.1"/>
                        </svg>
                        Grid First Mode
                    </h2>
                    ${renderGridFirstStatus()}
                </div>
                
                <!-- Schedule Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/>
                        </svg>
                        Today's Schedule
                    </h2>
                    ${renderSchedule(data.schedule)}
                </div>
                
                <!-- Statistics Card -->
                <div class="card">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 3v18h18M8 17V9M12 17V5M16 17v-3"/>
                        </svg>
                        Daily Statistics
                    </h2>
                    <div class="metric">
                        <span class="metric-label">Energy Produced</span>
                        <span class="metric-value positive">${formatEnergy(data.daily_production)} kWh</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Energy Consumed</span>
                        <span class="metric-value">${formatEnergy(data.daily_consumption)} kWh</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Grid Import</span>
                        <span class="metric-value negative">${formatEnergy(data.daily_import)} kWh</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Grid Export</span>
                        <span class="metric-value positive">${formatEnergy(data.daily_export)} kWh</span>
                    </div>
                </div>
            `;
            
            // Update last update time
            document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
        }
        
        function getModeClass(mode) {
            if (!mode) return '';
            if (mode.includes('Battery First')) return 'battery-first';
            if (mode.includes('Load First')) return 'load-first';
            if (mode.includes('Grid First')) return 'grid-first';
            return '';
        }
        
        function formatPower(value) {
            if (value === null || value === undefined) return '--';
            return Math.abs(value).toLocaleString();
        }
        
        function formatVoltage(value) {
            if (value === null || value === undefined) return '--';
            return value.toFixed(1);
        }
        
        function formatCurrent(value) {
            if (value === null || value === undefined) return '--';
            return value.toFixed(1);
        }
        
        function formatPrice(value) {
            if (value === null || value === undefined) return '--';
            return value.toFixed(2);
        }
        
        function formatEnergy(value) {
            if (value === null || value === undefined) return '--';
            return value.toFixed(2);
        }
        
        function formatTime(timestamp) {
            if (!timestamp) return '--';
            return new Date(timestamp).toLocaleTimeString();
        }
        
        function renderBatteryFirstStatus() {
            // Use API status data if available
            if (!apiStatusData || !apiStatusData.inverter_data) {
                return '<div class="metric"><span class="metric-label">Battery mode data not available</span></div>';
            }
            
            const inverterData = apiStatusData.inverter_data;
            const batteryData = inverterData.battery_first_data || {};
            let html = '';
            
            // Display raw JSON data from inverter
            html += `
                <div class="metric">
                    <span class="metric-label">Inverter Response:</span>
                </div>
                <pre style="background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px;">
${JSON.stringify(batteryData, null, 2)}
                </pre>
            `;
            
            // Active Power Rate (applies to all modes)
            if (inverterData.active_power_rate !== undefined) {
                html += `
                    <div class="metric" style="margin-top: 15px;">
                        <span class="metric-label"><strong>Current Power Rate</strong></span>
                        <span class="metric-value">${inverterData.active_power_rate}%</span>
                    </div>
                `;
            }
            
            return html;
        }
        
        function renderGridFirstStatus() {
            // Use API status data if available
            if (!apiStatusData || !apiStatusData.inverter_data) {
                return '<div class="metric"><span class="metric-label">Grid mode data not available</span></div>';
            }
            
            const inverterData = apiStatusData.inverter_data;
            const gridData = inverterData.grid_first_data || {};
            let html = '';
            
            // Display raw JSON data from inverter
            html += `
                <div class="metric">
                    <span class="metric-label">Inverter Response:</span>
                </div>
                <pre style="background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 12px;">
${JSON.stringify(gridData, null, 2)}
                </pre>
            `;
            
            return html;
        }
        
        function renderSchedule(schedule) {
            if (!schedule || schedule.length === 0) {
                return '<div class="metric"><span class="metric-label">No schedule configured</span></div>';
            }
            
            return schedule.map(item => `
                <div class="schedule-item">
                    <span class="schedule-time">${item.time}</span>
                    <span class="schedule-mode mode-badge ${getModeClass(item.mode)}">${item.mode}</span>
                </div>
            `).join('');
        }
        
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Initial load - fetch everything including slot configs
        fetchInverterData();
        
        // Auto-refresh telemetry data only (no GET commands)
        // This updates power flow, battery SOC, etc. without querying slot configs
        updateInterval = setInterval(fetchTelemetryData, 30000);
        
        // Add loading indication to refresh button for full data refresh
        window.refreshAllData = async function() {
            const refreshBtn = document.getElementById('refreshButton');
            const originalContent = refreshBtn.innerHTML;
            refreshBtn.innerHTML = '<span style="display: inline-block; animation: spin 1s linear infinite;">⟳</span> Loading...';
            refreshBtn.disabled = true;
            
            // Fetch everything including slot configurations
            await fetchInverterData();
            
            refreshBtn.innerHTML = originalContent;
            refreshBtn.disabled = false;
        }
        
        // Manual Mode Control Functions
        let selectedMode = 'auto';
        let selectedDuration = 'immediate';
        let countdownInterval = null;
        
        function selectMode(mode) {
            selectedMode = mode;
            
            // Update button states
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
            
            // Show/hide duration selector
            if (mode === 'auto') {
                document.getElementById('durationSelector').style.display = 'none';
                document.getElementById('advancedParams').style.display = 'none';
            } else {
                document.getElementById('durationSelector').style.display = 'block';
                document.getElementById('advancedParams').style.display = 'block';
                
                // Update advanced params based on mode
                if (mode === 'battery_first') {
                    document.getElementById('stopSoc').value = 90;
                    document.getElementById('powerRate').value = 100;
                } else if (mode === 'grid_first') {
                    document.getElementById('stopSoc').value = 20;
                    document.getElementById('powerRate').value = 10;
                }
            }
        }
        
        function selectDuration(duration) {
            selectedDuration = duration;
            
            // Update button states
            document.querySelectorAll('.duration-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.duration-btn[data-duration="${duration}"]`).classList.add('active');
            
            // Show/hide input fields
            document.getElementById('durationInputHours').style.display = duration === 'hours' ? 'block' : 'none';
            document.getElementById('durationInputTime').style.display = duration === 'until' ? 'block' : 'none';
        }
        
        async function applyManualMode() {
            if (selectedMode === 'auto') {
                alert('Please select Battery First or Grid First mode');
                return;
            }
            
            const payload = {
                mode: selectedMode,
                duration: {
                    type: selectedDuration
                },
                params: {
                    stop_soc: parseInt(document.getElementById('stopSoc').value),
                    power_rate: parseInt(document.getElementById('powerRate').value)
                },
                source: 'dashboard'
            };
            
            // Add duration value based on type
            if (selectedDuration === 'hours') {
                payload.duration.value = parseInt(document.getElementById('hoursInput').value);
            } else if (selectedDuration === 'until') {
                payload.duration.value = document.getElementById('timeInput').value;
            } else if (selectedDuration === 'end_of_day') {
                payload.duration.type = 'end_of_day';
            }
            
            try {
                const response = await fetch('/api/growatt/manual-mode', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('Manual mode applied:', result);
                    await updateManualStatus();
                    await fetchInverterData();
                } else {
                    const error = await response.json();
                    alert('Failed to apply manual mode: ' + error.error);
                }
            } catch (error) {
                console.error('Error applying manual mode:', error);
                alert('Failed to apply manual mode');
            }
        }
        
        async function resetToAutomatic() {
            if (!confirm('Reset to automatic price-based control?')) return;
            
            try {
                const response = await fetch('/api/growatt/manual-mode', {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    console.log('Reset to automatic mode');
                    selectMode('auto');
                    await updateManualStatus();
                    await fetchInverterData();
                } else {
                    const error = await response.json();
                    alert('Failed to reset: ' + error.error);
                }
            } catch (error) {
                console.error('Error resetting to automatic:', error);
                alert('Failed to reset to automatic mode');
            }
        }
        
        async function updateManualStatus() {
            try {
                const response = await fetch('/api/growatt/manual-mode');
                if (response.ok) {
                    const status = await response.json();
                    
                    const badge = document.getElementById('manualStatusBadge');
                    const currentModeValue = document.getElementById('currentModeValue');
                    const manualEndTime = document.getElementById('manualEndTime');
                    
                    if (status.active) {
                        // Manual mode is active
                        badge.textContent = 'MANUAL';
                        badge.classList.add('manual');
                        
                        const modeText = status.mode === 'battery_first' ? 'Battery First' : 'Grid First';
                        currentModeValue.textContent = `Manual: ${modeText}`;
                        
                        if (status.end_time) {
                            manualEndTime.style.display = 'block';
                            const endTime = new Date(status.end_time);
                            document.getElementById('endTimeValue').textContent = endTime.toLocaleString();
                            updateCountdown(endTime);
                        } else {
                            manualEndTime.style.display = 'block';
                            document.getElementById('endTimeValue').textContent = 'Until manually cleared';
                            document.getElementById('countdownTimer').textContent = '';
                        }
                        
                        // Update UI to reflect manual mode
                        selectMode(status.mode);
                    } else {
                        // Automatic mode
                        badge.textContent = 'AUTO';
                        badge.classList.remove('manual');
                        currentModeValue.textContent = 'Automatic (Price-Based)';
                        manualEndTime.style.display = 'none';
                        
                        if (countdownInterval) {
                            clearInterval(countdownInterval);
                            countdownInterval = null;
                        }
                        
                        selectMode('auto');
                    }
                }
            } catch (error) {
                console.error('Error fetching manual status:', error);
            }
        }
        
        function updateCountdown(endTime) {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
            
            const updateTimer = () => {
                const now = new Date();
                const remaining = endTime - now;
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    updateManualStatus();
                    return;
                }
                
                const hours = Math.floor(remaining / 3600000);
                const minutes = Math.floor((remaining % 3600000) / 60000);
                document.getElementById('countdownTimer').textContent = 
                    `(${hours}h ${minutes}m remaining)`;
            };
            
            updateTimer();
            countdownInterval = setInterval(updateTimer, 60000);
        }
        
        // Update manual status on page load and periodically
        updateManualStatus();
        setInterval(updateManualStatus, 30000);
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
        });
    </script>
</body>
</html>
